version: '3.9'

services:
  # MongoDB
  mongo:
    image: mongo:7.0
    container_name: cyberfolio_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS:-cyberfolio2025}
      MONGO_INITDB_DATABASE: cyberfolio
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - cyberfolio_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cyberfolio_backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASS:-cyberfolio2025}@mongo:27017/cyberfolio?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: 15m
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      API_URL: ${API_URL:-http://localhost:5000}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@cyberfolio.dev}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@12345}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
    ports:
      - "5000:5000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
    networks:
      - cyberfolio_net

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:5000}
        NEXT_PUBLIC_SITE_URL: ${SITE_URL:-http://localhost:3000}
    container_name: cyberfolio_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:5000}
      NEXT_PUBLIC_SITE_URL: ${SITE_URL:-http://localhost:3000}
    ports:
      - "3000:3000"
    networks:
      - cyberfolio_net

  # Nginx reverse proxy (production)
  nginx:
    image: nginx:alpine
    container_name: cyberfolio_nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./backend/uploads:/var/www/uploads:ro
    networks:
      - cyberfolio_net
    profiles:
      - production

volumes:
  mongo_data:
    driver: local

networks:
  cyberfolio_net:
    driver: bridge
